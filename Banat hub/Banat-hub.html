<!DOCTYPE html>
<html lang="en" ng-app="banatHubApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banat Hub - Food Delivery Made Easy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="LoginController">
    <div class="login-container">
        <!-- Left Side - Brand Section -->
        <div class="login-left">
            <div class="logo-section">
                <img src="images/logo.png" alt="Banat Hub Logo" class="logo-img">
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="login-right">
            <form class="login-form" name="loginForm" ng-submit="submitLogin()" novalidate>
                <h2>Login</h2>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        ng-model="credentials.email"
                        placeholder="Enter your email"
                        required
                    >
                    <span ng-show="loginForm.email.$touched && loginForm.email.$error.required" style="color: #e74c3c; font-size: 12px;">Email is required</span>
                    <span ng-show="loginForm.email.$touched && loginForm.email.$error.email" style="color: #e74c3c; font-size: 12px;">Invalid email</span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        ng-model="credentials.password"
                        placeholder="Enter your password"
                        required
                    >
                    <span ng-show="loginForm.password.$touched && loginForm.password.$error.required" style="color: #e74c3c; font-size: 12px;">Password is required</span>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-continue" ng-disabled="loginForm.$invalid">Continue</button>
                    <button type="button" class="btn btn-signup" ng-click="goToSignup()">Sign up</button>
                </div>

                <div class="forgot-password">
                    <a href="#forgot" ng-click="forgotPassword()">Forgot Password?</a>
                </div>

                <!-- Success/Error Messages -->
                <div ng-if="successMessage" style="color: #2ecc71; margin-top: 15px; text-align: center; font-weight: 600;">
                    {{ successMessage }}
                </div>
                <div ng-if="errorMessage" style="color: #e74c3c; margin-top: 15px; text-align: center; font-weight: 600;">
                    {{ errorMessage }}
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
