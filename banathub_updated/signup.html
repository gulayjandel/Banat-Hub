<!DOCTYPE html>
<html lang="en" ng-app="banatApp">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body class="signup-body" ng-controller="SignupController">

  <div class="signup-container">
    <div class="signup-card">
      <h2>Sign up</h2>

      <form ng-submit="signup()">
        <div class="input-group">
          <input type="email" placeholder="Email" ng-model="newUser.email" required>
          <span class="icon">📧</span>
        </div>

        <div class="input-group">
          <input type="password" placeholder="Password" ng-model="newUser.password" required>
          <span class="icon">🔒</span>
        </div>

        <div class="input-group">
          <input type="password" placeholder="Confirm Password" ng-model="newUser.confirmPassword" required>
          <span class="icon">🔒</span>
        </div>

        <button type="submit" class="btn green">Continue</button>
        <p style="text-align:center; margin-top:10px;">
          <a href="index.html" style="color: #4CAF50; text-decoration: none;">Back to Login</a>
        </p>
      </form>
    </div>
  </div>

  <script>
    angular.module('banatApp', [])
      .controller('SignupController', function($scope) {
        $scope.newUser = {};

        $scope.signup = function() {
          // Check if passwords match
          if ($scope.newUser.password !== $scope.newUser.confirmPassword) {
            alert("Passwords do not match!");
            return;
          }

          // Save the user object to LocalStorage
          // In a real app, you'd use an array of users, but for now, we'll store one
          localStorage.setItem('registeredUser', JSON.stringify($scope.newUser));
          
          alert("Account created successfully!");
          window.location.href = "index.html"; // Send them back to login
        };
      });
  </script>
</body>
</html>
