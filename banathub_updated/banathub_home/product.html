<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Banat Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="product-style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-app="productApp" ng-controller="ProductController">

    <header>
        <div class="logo">
            <a href="home.html" style="text-decoration: none; font-size: 24px; color: white; margin-right: 15px;">&#11013;</a>
            <img src="images/629994626_1247707730623982_5654588655489087962_n.png" alt="Banat Hub Logo"> 
        </div>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">Location</a></li>
                <li><a href="#">Promos</a></li>
                <li><a href="#">About us</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <button class="order-button">Order Now</button>
        </div>
    </header>

    <main class="container">
        <div class="product-page-container" ng-show="productData">
            
            <div class="product-images">
                <img ng-src="{{productData.img}}" alt="{{productData.name}}" class="main-product-img">
                <img src="images/629994626_1247707730623982_5654588655489087962_n.png" alt="Banat Hub" class="secondary-product-img">
            </div>

            <div class="product-details">
                <h1 class="product-title">{{productData.name}}</h1>
                <p class="base-price">₱{{productData.basePrice}}</p>
                <p class="product-description">{{productData.description}}</p>

                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

                <form ng-submit="addToCartWithSelections()">
                    
                    <div class="option-group">
                        <span class="option-group-title">{{productData.optionsTitle}}</span>
                        <span class="option-group-sub">(Select 1)</span>
                        <label class="option-choice" ng-repeat="opt in productData.options">
                            <input type="radio" ng-model="selections.mainOption" ng-value="opt" name="mainGroup">
                            {{opt}}
                        </label>
                    </div>

                    <div class="option-group" ng-if="!productData.isDrink && !productData.hideRice">
                        <span class="option-group-title">Choice C – Rice Options</span>
                        <span class="option-group-sub">(Select 1)</span>
                        <label class="option-choice">
                            <input type="radio" ng-model="selections.riceOption" value="Plain|0" name="riceGroup"> Plain Rice
                        </label>
                        <label class="option-choice">
                            <input type="radio" ng-model="selections.riceOption" value="Garlic|20" name="riceGroup"> Garlic Rice <span class="extra-price">(+₱20)</span>
                        </label>
                    </div>

                    <div class="option-group">
                        <span class="option-group-title">Extra Add-ons</span>
                        <span class="option-group-sub">(Optional)</span>
                        <label class="option-choice" ng-repeat="extra in productData.extras">
                            <input type="checkbox" ng-model="extra.selected">
                            {{extra.name}} <span class="extra-price">(+₱{{extra.price}})</span>
                        </label>
                    </div>

                    <div class="product-action-bar">
                        <div class="total-container">
                            <span style="font-size: 14px; color: #888;">Total Price:</span>
                            <span class="final-total-price">₱{{ calculateFinalPrice() }}</span>
                        </div>
                        <button type="submit" class="large-add-button">🛒 Add To Cart</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
angular.module('productApp', [])
.controller('ProductController', function($scope) {

    const productDatabase = {
        'Grilled Liempo': { 
            name: 'Grilled Liempo', 
            basePrice: 159, 
            img: 'images/Image_gjddywgjddywgjdd.png', 
            description: 'Succulent Grilled Liempo marinated in our signature Bohol blend.', 
            optionsTitle: 'Serving Size', 
            options: ['Solo (1 pc)', 'Sharing (2 pcs)'], 
            extras: [{ name: 'Extra Sauce', price: 10, selected: false }, { name: 'Extra Atchara', price: 15, selected: false }] 
        },
        'Crispy Pork Sisig': { 
            name: 'Crispy Pork Sisig', 
            basePrice: 149, 
            img: 'images/Image_ytla93ytla93ytla.png', 
            description: 'Sizzling crispy pork bits with onions and special seasoning.', 
            optionsTitle: 'Spice Level', 
            options: ['Classic', 'Spicy'], 
            extras: [{ name: 'Sunny Side-Up', price: 15, selected: false }, { name: 'Chili Oil', price: 10, selected: false }] 
        },
        'Pancit Malabon': { 
            name: 'Pancit Malabon', 
            basePrice: 139, 
            img: 'images/Image_fd7j23fd7j23fd7j.png', 
            description: 'Traditional thick noodles with rich orange sauce and seafood toppings.', 
            optionsTitle: 'Serving Size', 
            options: ['Regular', 'Large'], 
            extras: [{ name: 'Extra Toppings', price: 30, selected: false }] 
        },
        'Crispy Pata': { 
            name: 'Crispy Pata', 
            basePrice: 499, 
            img: 'images/crispypata.png', 
            description: 'Whole pork leg deep-fried to golden perfection with crackling skin.', 
            optionsTitle: 'Size', 
            options: ['Standard', 'Family'], 
            extras: [{ name: 'Extra Dip', price: 10, selected: false }] 
        },
        'Sinigang na Hipon': { 
            name: 'Sinigang na Hipon', 
            basePrice: 380, 
            img: 'images/sinigang_na_hipon.png', 
            description: 'Sour and savory tamarind soup with fresh local shrimp and vegetables.', 
            optionsTitle: 'Serving Style', 
            options: ['Classic Sour', 'Mild'], 
            extras: [{ name: 'Extra Shrimp', price: 85, selected: false }] 
        },
        'Strawberry Milkshake': { 
            name: 'Strawberry Milkshake', 
            basePrice: 99, 
            img: 'images/Image_875ofv875ofv875o.png', 
            description: 'A creamy, chilled blend of fresh strawberries and premium milk.', 
            optionsTitle: 'Sugar Level', 
            options: ['100% (Normal)', '50% (Less Sugar)', '0% (No Sugar)'], 
            isDrink: true, 
            extras: [{ name: 'Extra Whipped Cream', price: 20, selected: false }] 
        },
        'Mango Bravo Shake': { 
            name: 'Mango Bravo Shake', 
            basePrice: 119, 
            img: 'images/Mango_shake.png', 
            description: 'Thick mango shake made with ripe Bohol mangoes.', 
            optionsTitle: 'Sugar Level', 
            options: ['Normal', 'Less Sugar'], 
            isDrink: true, 
            extras: [{ name: 'Extra Mango Cubes', price: 25, selected: false }] 
        },
        'Buko Pandan': { 
            name: 'Buko Pandan', 
            basePrice: 120, 
            img: 'images/Buko_pandan.png', 
            description: 'Refreshing coconut juice infused with pandan and young coconut strips.', 
            optionsTitle: 'Ice Level', 
            options: ['Normal Ice', 'Less Ice', 'No Ice'], 
            isDrink: true, 
            extras: [{ name: 'Extra Buko Strips', price: 20, selected: false }] 
        },
'Extra Atchara': { 
    name: 'Extra Atchara', 
    basePrice: 49, 
    img: 'images/Atchara.png', 
    description: 'Our signature pickled papaya—the perfect sweet and sour side.', 
    optionsTitle: 'Serving Size', 
    options: ['Regular Cup'], 
    hideRice: true, // New flag to hide the rice section
    extras: [] 
},
'Java Rice': { 
    name: 'Java Rice', 
    basePrice: 55, 
    img: 'images/Java_rice.png', 
    description: 'Aromatic yellow rice seasoned with garlic and annatto.', 
    optionsTitle: 'Portion', 
    options: ['Single Scoop', 'Double Scoop'], 
    hideRice: true, // New flag to hide the rice section
    extras: [{ name: 'Extra Fried Garlic', price: 5, selected: false }] 
}
    };

    let params = new URLSearchParams(window.location.search);
    let itemName = params.get('item');
    $scope.productData = productDatabase[itemName] || productDatabase['Grilled Liempo'];

    if ($scope.productData) {
        $scope.selections = {
            mainOption: $scope.productData.options[0],
            riceOption: 'Plain|0'
        };
    }

$scope.calculateFinalPrice = function() {
    if (!$scope.productData) return 0;
    let total = $scope.productData.basePrice;
    
    // Only add rice cost if rice options are NOT hidden
    if (!$scope.productData.isDrink && !$scope.productData.hideRice && $scope.selections.riceOption) {
        let riceCost = parseInt($scope.selections.riceOption.split('|')[1]);
        total += riceCost;
    }
    
    $scope.productData.extras.forEach(extra => {
        if (extra.selected) total += extra.price;
    });
    return total;
};

    $scope.addToCartWithSelections = function() {
        let riceName = $scope.selections.riceOption.split('|')[0];
        let extras = $scope.productData.extras.filter(e => e.selected).map(e => e.name).join(", ");
        
        let cartItem = {
            name: $scope.productData.name,
            img: $scope.productData.img,
            price: $scope.calculateFinalPrice(),
            quantity: 1,
            details: $scope.selections.mainOption + 
                     (!$scope.productData.isDrink && riceName !== 'Plain' ? " + " + riceName : "") + 
                     (extras ? " + " + extras : "")
        };

        let cart = JSON.parse(localStorage.getItem('banatCart')) || [];
        let existing = cart.find(i => i.name === cartItem.name && i.details === cartItem.details);
        
        if (existing) { 
            existing.quantity += 1; 
        } else { 
            cart.push(cartItem); 
        }
        
        localStorage.setItem('banatCart', JSON.stringify(cart));
        alert("Added to cart!");
        window.location.href = "home.html";
    };
});
</script>
</body>
</html>
