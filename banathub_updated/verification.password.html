<!DOCTYPE html>
<html lang="en" ng-app="banatApp">
<head>
  <meta charset="UTF-8">
  <title>Verify Identity</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="signup-body" ng-controller="VerifyController">

  <div class="signup-container">
    <div class="signup-card">
      <h2>Verify Identity</h2>

      <div ng-if="!codeSent">
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Enter your email to receive a reset code.</p>
        <form ng-submit="sendEmail()">
          <div class="input-group">
            <input type="email" placeholder="Gmail Address" ng-model="data.email" required>
            <span class="icon">📧</span>
          </div>
          <button type="submit" class="btn green" ng-disabled="loading">
            {{ loading ? 'Sending...' : 'Send Verification Code' }}
          </button>
        </form>
      </div>

      <div ng-if="codeSent">
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Enter the 6-digit code sent to your Gmail.</p>
        <form ng-submit="checkCode()">
          <div class="input-group">
            <input type="text" placeholder="Enter Code" ng-model="data.userCode" required>
            <span class="icon">🔑</span>
          </div>
          <button type="submit" class="btn green">Verify Code</button>
        </form>
      </div>

      <p style="text-align:center; margin-top:20px;">
        <a href="index.html" style="color: #4CAF50; text-decoration: none;">Return to Login</a>
      </p>
    </div>
  </div>

  <script>
    // 2. Initialize with your Public Key (find this in Account > API Keys)
    (function() {
        emailjs.init("Z787h2SNNT-WckZGT"); 
    })();

    angular.module('banatApp', [])
      .controller('VerifyController', function($scope) {
        $scope.data = {};
        $scope.codeSent = false;
        $scope.generatedCode = "";
        $scope.loading = false;

        $scope.sendEmail = function() {
          // Check against your local storage first
          const storedUser = JSON.parse(localStorage.getItem('registeredUser'));

          if (!storedUser || $scope.data.email !== storedUser.email) {
            alert("This email is not registered.");
            return;
          }

          $scope.loading = true;
          // Generate a 6-digit verification code
          $scope.generatedCode = Math.floor(100000 + Math.random() * 900000).toString();

          // These variables MUST match the {{to_email}} and {{message}} tags in your EmailJS template
          const templateParams = {
            to_email: $scope.data.email,
            message: "Your Banat Hub password reset code is: " + $scope.generatedCode
          };

          // 3. Send using your Service ID and Template ID
          emailjs.send('service_4vb6emx', 'template_2klhs0q', templateParams)
            .then(function() {
              $scope.$apply(function() {
                $scope.codeSent = true;
                $scope.loading = false;
                alert("Check your Gmail! Verification code sent.");
              });
            }, function(error) {
              $scope.$apply(function() { $scope.loading = false; });
              console.log("FAILED", error);
              alert("Failed to send email. Check your ID and Template settings.");
            });
        };

        $scope.checkCode = function() {
          if ($scope.data.userCode === $scope.generatedCode) {
            // Give temporary "verified" status in local storage
            localStorage.setItem('tempVerifiedEmail', $scope.data.email);
            window.location.href = "forgot.password.html";
          } else {
            alert("Invalid code. Please try again.");
          }
        };
      });
  </script>
</body>
</html>
