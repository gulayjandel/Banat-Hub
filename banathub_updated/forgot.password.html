<!DOCTYPE html>
<html lang="en" ng-app="banatApp">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body class="signup-body" ng-controller="ForgotPasswordController">

  <div class="signup-container">
    <div class="signup-card">
      <h2>Reset Password</h2>
      <p style="text-align: center; color: #666; font-size: 0.9em; margin-bottom: 20px;">
        Enter your registered email and a new password.
      </p>

      <form ng-submit="resetPassword()">
        <div class="input-group">
          <input type="email" placeholder="Registered Email" ng-model="resetData.email" required>
          <span class="icon">📧</span>
        </div>

        <div class="input-group">
          <input type="password" placeholder="New Password" ng-model="resetData.newPassword" required>
          <span class="icon">🔒</span>
        </div>

        <div class="input-group">
          <input type="password" placeholder="Confirm New Password" ng-model="resetData.confirmPassword" required>
          <span class="icon">🔒</span>
        </div>

        <button type="submit" class="btn green">Reset Password</button>
        
        <p style="text-align:center; margin-top:20px;">
          <a href="index.html" style="color: #4CAF50; text-decoration: none;">Back to Login</a>
        </p>
      </form>
    </div>
  </div>

  <script>
  (function() {
      // 1. REPLACE THIS with your Public Key from the Account page
      emailjs.init("Z787h2SNNT-WckZGT"); 
  })();

  // Inside Forgot.password.html <script>
angular.module('banatApp', [])
  .controller('ForgotPasswordController', function($scope) {
    $scope.resetData = {};
    
    // Check if the user passed the verification step
    const verifiedEmail = localStorage.getItem('tempVerifiedEmail');
    if (!verifiedEmail) {
      alert("Please verify your email first.");
      window.location.href = "verification.password.html";
      return;
    }

    // Auto-fill the verified email
    $scope.resetData.email = verifiedEmail;

    $scope.resetPassword = function() {
      const storedUser = JSON.parse(localStorage.getItem('registeredUser'));

      if ($scope.resetData.newPassword !== $scope.resetData.confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      // Update the password in LocalStorage
      storedUser.password = $scope.resetData.newPassword;
      localStorage.setItem('registeredUser', JSON.stringify(storedUser));
      
      // Clean up the temporary verification tag
      localStorage.removeItem('tempVerifiedEmail');
      
      alert("Password updated successfully! You can now log in.");
      window.location.href = "index.html"; 
    };
  });
</script>
</body>
</html>
