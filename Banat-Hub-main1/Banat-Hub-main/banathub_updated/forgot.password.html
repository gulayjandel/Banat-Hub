<!DOCTYPE html>
<html lang="en" ng-app="banatApp">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body class="signup-body" ng-controller="ForgotPasswordController">

  <div class="signup-container">
    <div class="signup-card">
      <h2>Reset Password</h2>
      <p style="text-align: center; color: #666; font-size: 0.9em; margin-bottom: 20px;">
        Enter your registered email and a new password.
      </p>

      <form ng-submit="resetPassword()">
        <div class="input-group">
          <input type="email" placeholder="Registered Email" ng-model="resetData.email" required>
          <span class="icon">📧</span>
        </div>

        <div class="input-group">
          <input type="password" placeholder="New Password" ng-model="resetData.newPassword" required>
          <span class="icon">🔒</span>
        </div>

        <div class="input-group">
          <input type="password" placeholder="Confirm New Password" ng-model="resetData.confirmPassword" required>
          <span class="icon">🔒</span>
        </div>

        <button type="submit" class="btn green">Reset Password</button>
        
        <p style="text-align:center; margin-top:20px;">
          <a href="index.html" style="color: #004202; text-decoration: none;">Back to Login</a>
        </p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
  // 1. Initialize EmailJS
  (function() {
      emailjs.init("Z787h2SNNT-WckZGT"); 
  })();

  // 2. Initialize the Angular Module correctly
  var app = angular.module('banatApp', []);

  app.controller('ForgotPasswordController', function($scope) {
    $scope.resetData = {};
    
    // Check if the user passed the verification step
    const verifiedEmail = localStorage.getItem('tempVerifiedEmail');
    if (!verifiedEmail) {
      alert("Please verify your email first.");
      window.location.href = "verification.password.html";
      return;
    }

    // Auto-fill the verified email
    $scope.resetData.email = verifiedEmail;

    $scope.resetPassword = function() {
      // Get the existing user data
      const rawData = localStorage.getItem('registeredUser');
      
      if (!rawData) {
        alert("No registered user found in this browser.");
        return;
      }

      let storedUser = JSON.parse(rawData);

      // Validate passwords match
      if ($scope.resetData.newPassword !== $scope.resetData.confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      // Update the password in the object
      storedUser.password = $scope.newUser ? $scope.newUser.password : $scope.resetData.newPassword;
      
      // CRITICAL: Overwrite the storage with the new object
      localStorage.setItem('registeredUser', JSON.stringify(storedUser));
      
      // Clean up and Redirect
      localStorage.removeItem('tempVerifiedEmail');
      alert("Password updated successfully! Redirecting to login...");
      window.location.href = "index.html"; 
    };
  });
</script>
</body>
</html>
